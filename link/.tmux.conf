# vim:set ft=tmux:

TMUX_CUSTOM_MODULES_DIR="$DOTFILES/extras/tmux/catppuccin"

source "$DOTFILES/extras/tmux/options.conf"
source "$DOTFILES/extras/tmux/keybinds.conf"
source "$DOTFILES/extras/tmux/theme.conf"

#============================
# catppuccin
#============================
set -g @plugin 'catppuccin/tmux#v2.1.3'

#============================
# Continuum
#============================
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

#============================
# Resurrect
#============================
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'off'  # tmux pane contents.
set -g @resurrect-strategy-nvim 'session'      # restore neovim session if Session.vim is found
set -g @resurrect-processes 'nvim'

#============================
# smart-splits
#============================
set -g @plugin 'mrjones2014/smart-splits.nvim'

# Optional configurations with their default values if omitted:
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)

set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--

set -g @smart-splits_resize_left_key  'M-h' # key-mapping for resizing.
set -g @smart-splits_resize_down_key  'M-j' #  --"--
set -g @smart-splits_resize_up_key    'M-k' #  --"--
set -g @smart-splits_resize_right_key 'M-l' #  --"--

set -g @smart-splits_resize_step_size '1' # change the step-size for resizing.

#============================
# Git
#============================
set -g @plugin 'Djuuu/tmux-git-status'
set -g @plugin 'kristijanhusak/tmux-simple-git-status'

#============================
# Popup
#============================
set -g @plugin 'loichyan/tmux-toggle-popup'

#============================
# Stats
#============================
set -g @plugin 'tmux-plugins/tpm'
# General
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-autoreload'
# CPU Stats
set -g @plugin 'tmux-plugins/tmux-cpu'
# Toggle popup

# Initializing tpm
run '~/.tmux/plugins/tpm/tpm'

# Conditional loading of different files
if-shell "uname | grep -q Darwin" "source-file ~/.tmux-osx.conf"
if-shell "uname | grep -q Linux" "source-file ~/.tmux-linux.conf"
