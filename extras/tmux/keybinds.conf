# vim:set ft=tmux:

#============================
# KEY BINDINGS
#============================
set -g status-keys vi
set -g mode-keys vi
set -gw xterm-keys on

# change prefix binding
unbind C-b
set -g prefix C-a


#============================
# OLD RESIZE BINDINGS
#============================
# switch panes using Alt-arrow without prefix
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
# is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
#     | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
# bind-key -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
# bind-key -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
# bind-key -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
# bind-key -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
# bind-key -T copy-mode-vi C-h select-pane -L
# bind-key -T copy-mode-vi C-j select-pane -D
# bind-key -T copy-mode-vi C-k select-pane -U
# bind-key -T copy-mode-vi C-l select-pane -R
#============================
# NEW RESIZE BINDINGS
#============================
# '@pane-is-vim' is a pane-local option that is set by the plugin on load,
# and unset when Neovim exits or suspends; note that this means you'll probably
# not want to lazy-load smart-splits.nvim, as the variable won't be set until
# the plugin is loaded
# Smart pane switching with awareness of Neovim splits.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'
# Alternatively, if you want to disable wrapping when moving in non-neovim panes, use these bindings
# bind-key -n C-h if -F '#{@pane-is-vim}' { send-keys C-h } { if -F '#{pane_at_left}'   '' 'select-pane -L' }
# bind-key -n C-j if -F '#{@pane-is-vim}' { send-keys C-j } { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
# bind-key -n C-k if -F '#{@pane-is-vim}' { send-keys C-k } { if -F '#{pane_at_top}'    '' 'select-pane -U' }
# bind-key -n C-l if -F '#{@pane-is-vim}' { send-keys C-l } { if -F '#{pane_at_right}'  '' 'select-pane -R' }
# Smart pane resizing with awareness of Neovim splits.
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
        "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
        "bind-key -n 'C-\\' if -F \"#{@pane-is-vim}\" 'send-keys C-\\\\'  'select-pane -l'"
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Default movement binds
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Formatting for choose-tree
# session_format='#{?pane_format,#{s|$HOME|~|:pane_current_path}: #{pane_current_command},#{?window_format, #{s|$HOME|~|:pane_current_path}: #{window_name} [#{window_flags}],#{s|$HOME|~|:session_path} }}'
session_format='#{?pane_format,#{s|$HOME|~|:pane_current_path}: #{pane_current_command},#{?window_format, #{s|$HOME|~|:pane_current_path}: #{?window_name_set,"#{window_name}",#{window_name}} [#{window_flags}],#{s|$HOME|~|:session_path} }}'

# Set ordering for choose-tree
bind w choose-tree -wZ -f "#{!:#{m:_*,#{session_name}}}" -F "$session_format"
bind W choose-tree -Z -F "$session_format"
bind s choose-tree -s -F "$session_format"

# Function keys.
# bind-key -n C-[ previous-window
# bind-key -n C-] next-window
# bind -T root C-S-[ swap-window -t -1
# bind -T root C-S-] swap-window -t +1

# override default window splitting
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

#============================
# FLOATING WINDOWS
#============================
bind -n F2 run "#{@popup-toggle} -w70% -h80% -Ed'##{pane_current_path}' --name=lazygit lazygit"
bind -n F3 run "#{@popup-toggle} -w70% -h80% -Ed'##{pane_current_path}' --name=lazydocker lazydocker"
bind -n F4 run "#{@popup-toggle} -w70% -h80% -Ed'##{pane_current_path}' --name=htop htop"
# bind -n F6 run "#{@popup-toggle} -w70% -h80% -Ed'##{pane_current_path}'"

# reload the tmux.conf file
bind r source-file ~/.tmux.conf

#============================
# COPY MODE
#============================
# override copy and pasting
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Copy selected text (YANK MODE) {
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"
# }
