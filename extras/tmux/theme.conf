# vim:set ft=tmux:

#============================
# Catppuccin
#============================
CATPPUCCIN_PATH="~/.tmux/plugins/tmux/"

set -g @catppuccin_flavor "mocha"
set -g status-position top
set -g status-justify left

# Pane shading
set -g window-style "bg=#181825"
set -g window-active-style "bg=#1e1e2e"

set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator "█"

default_window_text=" #{=|-15|...;s|$HOME|~|:pane_current_path} #{?#{n:window_name},#{window_name} - }"

# Hide vertical lines by matching the border color to the inactive window background
# --- THESE LINES DO NOT DO ANYTHING.
# for some reason the catppuccin stuff doesn't work unless these lines are defined.
set -g pane-border-style "fg=#{@thm_base} bg=#{@thm_lavender}"
set -g pane-active-border-style "fg=#{@thm_base} bg=#{@thm_lavender}"
set -g pane-border-status "top"
set -g pane-border-format "#[align=centre]#[bold,underscore,fg=#{@thm_white},bg=#{@thm_crust}]#{pane_title}#[nobold,nounderscore] "
set -g pane-border-indicators "off"

set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_border_status "yes"
set -g @catppuccin_pane_default_text "#{pane_current_command} "
set -g @catppuccin_pane_default_fill "number"
set -g @catppuccin_pane_number_position "left"
set -g @catppuccin_pane_left_separator "#[align=centre]█"
set -g @catppuccin_pane_middle_separator "█"
set -g @catppuccin_pane_right_separator ""
set -g @catppuccin_pane_border_style "bg=#{@thm_mantle} fg=#{@thm_mantle}"
set -g @catppuccin_pane_active_border_style "bg=#{@thm_mantle} fg=#{@thm_mantle}"
set -g @catppuccin_pane_color "#{@thm_lavender},bold"
set -g @catppuccin_pane_background_color "#{@thm_surface_0}"

set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_text "$default_window_text"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_right_separator ""

# set -g @catppuccin_window_current_number_color ""
# set -g @catppuccin_window_current_text_color ""
set -g @catppuccin_window_current_status_style "custom"
set -g @catppuccin_window_current_text "$default_window_text"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_current_left_separator " "
set -g @catppuccin_window_current_middle_separator " "
set -g @catppuccin_window_current_right_separator " " 

# load custom modules
run-shell "for f in $TMUX_CUSTOM_MODULES_DIR/*.conf; do tmux source-file \"\$f\"; done"


set -g status-left-length 120
set -g status-left "#{E:@catppuccin_status_session} "
set -ag status-left "#[bg=#{@thm_surface_0}] #{git_status} #[bg=#{@thm_mantle},nobold] "
set -ag status-left "#[bg=#{@thm_mantle},fg=#{@thm_lavender},bold] windows > #[bg=#{@thm_mantle},nobold] "

set -g status-right-length 120
set -gF status-right "#{E:@catppuccin_status_cpu} "
set -ag status-right "#{E:@catppuccin_status_host}"

